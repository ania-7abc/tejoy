# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
site_name: "tejoy documentation"
site_url: "https://ania-7abc.github.io/tejoy"
site_description: "A cross-platform C++ library for building asynchronous messanger"
site_author: "ania-7abc"
copyright: "Copyright (c) 2026 ania-7abc SPDX-License-Identifier: MIT"

repo_url: "https://github.com/ania-7abc/tejoy"
edit_uri: "edit/main/docs/"

docs_dir: "docs"
site_dir: "site"
remote_branch: gh-pages

hooks:
  - mkdocs_hooks.py

theme:
  name: "material"

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.path
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.preview

    - header.autohide

    - toc.follow

    - search.suggest
    - search.highlight
    - search.share

    - content.code.annotate
    - content.code.copy
    - content.action.edit
    - content.action.view
    - content.tooltips

  palette:
    - scheme: "default"
      primary: "red"
      accent: "red"
      media: "(prefers-color-scheme: light)"
      toggle:
        icon: "material/weather-night"
        name: "Switch to dark mode"
    - scheme: "slate"
      primary: "red"
      accent: "red"
      media: "(prefers-color-scheme: dark)"
      toggle:
        icon: "material/weather-sunny"
        name: "Switch to light mode"

  font:
    text: "Roboto"
    code: "JetBrains Mono"

plugins:
  - search
  - git-committers:
      repository: ania-7abc/tejoy
      branch: main
  - offline

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      use_pygments: true
      linenums: true
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - footnotes
  - toc:
      title: On this page
      permalink: true
      permalink_title: Anchor link to this section for reference
  - tables
